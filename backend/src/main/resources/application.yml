spring:
  application:
    name: messenger
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${BACKEND_PORT:8082}

app:
  auth:
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7
    cookie-secure: false
  file:
    storage-path: ${FILE_STORAGE_PATH:./uploads}
    image-max-bytes: 10485760
    other-max-bytes: 52428800
  security:
    jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    internal-api-key: ${INTERNAL_API_KEY:change-me}
  external:
    auth-base-url: ${INTERNAL_AUTH_BASE_URL:http://localhost:9090}
    auth-timeout-seconds: 3
    auth-login-path: ${INTERNAL_AUTH_LOGIN_PATH:/api/v1/login}
    user-list-path: ${INTERNAL_AUTH_USER_LIST_PATH:/api/v1/getUserList}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${JDBC_URL:jdbc:mysql://localhost:3306/messenger?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    driver-class-name: ${JDBC_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    username: ${JDBC_USERNAME:root}
    password: ${JDBC_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:messenger_user}
      password: ${REDIS_PASSWORD:1234}

logging:
  level:
    org.hibernate.SQL: debug

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${JDBC_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:messenger;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      username: ${REDIS_USERNAME:messenger_user}
      password: ${REDIS_PASSWORD:1234}
